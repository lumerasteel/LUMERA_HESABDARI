<style>
  :root{--red:#E61E32;--gray:#7A7A7A;}
  *{box-sizing:border-box;}
  body{font-family:Tahoma,Arial,sans-serif;background:#fff;color:#000;margin:0;padding:0;}
  .wrap{max-width:480px;margin:0 auto;padding:16px;}
  h1{font-size:20px;font-weight:700;margin:0 0 2px;}
  .sub{color:var(--gray);font-size:13px;margin:0 0 16px;}
  .tabs{display:flex;gap:4px;border-bottom:1px solid #e5e5e5;margin-bottom:16px;overflow-x:auto;}
  .tab-btn{display:flex;align-items:center;gap:4px;padding:8px 10px;font-size:13px;background:none;border:none;border-bottom:2px solid transparent;color:var(--gray);cursor:pointer;white-space:nowrap;font-family:inherit;}
  .tab-btn.active{border-color:#000;color:#000;font-weight:700;}
  input,select{font-family:inherit;border:1px solid #ccc;border-radius:6px;padding:8px;font-size:13px;width:100%;}
  .row-flex{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
  .btn{border:none;border-radius:6px;padding:8px 12px;font-size:13px;cursor:pointer;font-family:inherit;}
  .btn-black{background:#000;color:#fff;}
  .btn-outline{background:#fff;color:#000;border:1px solid #ccc;}
  .btn-red{background:var(--red);color:#fff;}
  .btn-icon{background:none;border:none;color:#c33;cursor:pointer;padding:4px 8px;font-size:15px;}
  .card{border:1px solid #e5e5e5;border-radius:10px;padding:10px;margin-bottom:8px;}
  .card-active{border-color:var(--red);}
  .card-title{font-weight:700;font-size:14px;}
  .card-sub{font-size:12px;color:var(--gray);}
  .box-gray{background:#fafafa;border-radius:10px;padding:12px;margin-bottom:16px;}
  /* ---------- DESKTOP LAYOUT (≥960px: لپ‌تاپ/مانیتور) ---------- */
  /* زیر این حد، چیدمان موبایل فعلی (تک‌ستونه با تب‌های افقی) بدون تغییر باقی می‌ماند */
  @media (min-width:960px){
    body{background:#F5F5F5;}
    .wrap{
      max-width:1200px;
      display:grid;
      grid-template-columns:220px 1fr; /* سایدبار راست (طبیعی برای RTL)، محتوا چپ با عرض بیشتر */
      grid-template-areas:"header header" "sidebar content" "footer footer";
      gap:0 24px;
      padding:28px 32px;
    }
    .page-header{grid-area:header;margin-bottom:24px;}
    .page-header h1{margin-bottom:2px;}
    .page-header .sub{margin-bottom:0;}
    .tabs{
      grid-area:sidebar;
      flex-direction:column;
      align-items:stretch;
      border-bottom:none;
      border-left:1px solid #e5e5e5;
      padding-left:16px;
      gap:2px;
      overflow-x:visible;
      position:sticky;
      top:28px;
      align-self:start;
      height:fit-content;
    }
    .tab-btn{
      justify-content:flex-start;
      padding:10px 14px;
      border-bottom:none;
      border-right:2px solid transparent;
      border-radius:6px;
    }
    .tab-btn.active{
      border-color:var(--red);
      background:#fff;
    }
    .tab-btn:hover:not(.active){background:#fff;}
    #tabContent{
      grid-area:content;
      background:#fff;
      border:1px solid #e5e5e5;
      border-radius:14px;
      padding:28px;
      max-width:800px;
    }
    .backup-row{ grid-area:footer; max-width:800px; }
    .wrap > .note{ grid-area:footer; max-width:800px; }
  }
  .results{background:#000;color:#fff;border-radius:10px;padding:16px;margin-bottom:12px;}
  .r-row{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;}
  .r-row.bold{font-weight:700;}
  .r-row.accent{color:var(--red);}
  hr.sep{border:none;border-top:1px solid #444;margin:8px 0;}
  .empty{color:#aaa;font-size:13px;text-align:center;padding:24px 0;}
  .pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .pill{border:1px solid #ccc;border-radius:999px;padding:4px 10px;font-size:12px;background:#fff;color:var(--gray);cursor:pointer;font-family:inherit;}
  .pill-active{background:#000;color:#fff;border-color:#000;}
  .mode-toggle{display:flex;gap:8px;margin-bottom:8px;}
  .mode-toggle button{flex:1;}
  label.small{font-size:12px;color:var(--gray);white-space:nowrap;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:4px;font-size:12px;color:#444;margin-top:8px;}
  h2.sec{font-size:13px;font-weight:700;margin-bottom:8px;}
  .note{font-size:11px;color:var(--gray);margin-top:24px;text-align:center;}

  /* ---- INVOICE TAB ---- */
  .inv-status{display:inline-block;font-size:11px;font-weight:700;border-radius:999px;padding:3px 10px;cursor:pointer;user-select:none;border:1px solid #ccc;}
  .inv-status.draft{background:#F0F0F0;color:var(--gray);border-color:#D0D0D0;}
  .inv-status.final{background:#FFF0F1;color:var(--red);border-color:var(--red);}
  .inv-status.paid{background:#F0FFF4;color:#1A7A3A;border-color:#1A7A3A;}
  .inv-status.cancelled{background:#F0F0F0;color:#999;border-color:#ccc;text-decoration:line-through;}
  .inv-line{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .inv-line select{flex:1.4;}
  .inv-line input.qty{width:54px;}
  .inv-line .lt{flex:1;font-size:12px;}
  .badge-activity{display:inline-block;font-size:11px;border-radius:6px;padding:2px 8px;background:#000;color:#fff;margin-left:4px;}
  .inv-card .card-title{display:flex;justify-content:space-between;align-items:center;}

  /* hidden offscreen render target for A4 JPG export */
  #invoiceRenderRoot{position:fixed;left:-9999px;top:0;}
  .a4-wrap{width:794px;background:#fff;font-family:'Vazirmatn',Tahoma,Arial,sans-serif;direction:rtl;}
  .a4-page{padding:40px 52px 32px 52px;display:flex;flex-direction:column;}
  .a4-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .a4-header-right{display:flex;flex-direction:column;gap:3px;}
  .a4-header-name{font-size:13px;font-weight:700;color:#000;white-space:nowrap;}
  .a4-header-meta{font-size:10.5px;color:#7A7A7A;white-space:nowrap;}
  .a4-logo{height:60px;width:auto;object-fit:contain;}
  .a4-title-bar{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
  .a4-red-line{flex:1;height:2px;background:var(--red);}
  .a4-invoice-title{font-size:20px;font-weight:800;color:#000;white-space:nowrap;}
  .a4-grid{display:grid;gap:1px;background:#E0E0E0;border-radius:10px;overflow:hidden;margin-bottom:8px;}
  .a4-meta-grid{grid-template-columns:1.3fr 1.3fr 1fr 1fr 1fr;}
  .a4-customer-grid{grid-template-columns:2fr 1.2fr 1fr;margin-bottom:14px;}
  .a4-cell{background:#F7F7F7;padding:9px 13px;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
  .a4-cell-label{font-size:9.5px;color:#7A7A7A;font-weight:500;white-space:nowrap;}
  .a4-cell-value{font-size:11.5px;color:#000;font-weight:600;white-space:nowrap;overflow:hidden;}
  .a4-note{font-size:9.5px;color:#7A7A7A;margin-bottom:4px;}
  .a4-table{width:100%;border-collapse:separate;border-spacing:0;margin-bottom:4px;}
  .a4-table thead tr{background:#000;}
  .a4-table thead th{padding:9px 10px;font-size:10.5px;font-weight:600;color:#fff;text-align:center;white-space:nowrap;}
  .a4-table thead th:first-child{border-radius:0 8px 0 0;}
  .a4-table thead th:last-child{border-radius:8px 0 0 0;}
  .a4-col-num{width:30px;}.a4-col-desc{width:33%;}.a4-col-mat{width:17%;}.a4-col-qty{width:8%;}.a4-col-unit{width:14%;}.a4-col-total{width:14%;}
  .a4-table tbody tr{background:#fff;}
  .a4-table tbody tr:nth-child(even){background:#FAFAFA;}
  .a4-table tbody td{padding:6px 8px;font-size:11px;text-align:center;height:34px;border-bottom:1px solid #F0F0F0;border-left:1px solid #F0F0F0;}
  .a4-table tbody td:last-child{border-left:none;}
  .a4-table tbody td.a4-col-desc{text-align:right;padding-right:10px;}
  .a4-row-num{font-size:9.5px;color:#C0C0C0;}
  .a4-bottom-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;flex:1;}
  .a4-terms-box{background:#F7F7F7;border-radius:12px;padding:12px 14px;}
  .a4-terms-title{font-size:10.5px;font-weight:700;color:#000;margin-bottom:8px;padding-bottom:5px;border-bottom:1.5px solid var(--red);display:inline-block;}
  .a4-terms-list{list-style:none;display:flex;flex-direction:column;gap:5px;padding:0;margin:0;}
  .a4-terms-list li{font-size:9.5px;color:#7A7A7A;line-height:1.65;padding-right:10px;position:relative;}
  .a4-terms-list li::before{content:'';position:absolute;right:0;top:6px;width:3.5px;height:3.5px;background:#C0C0C0;border-radius:50%;}
  .a4-terms-list li.important{color:#000;font-weight:600;}
  .a4-terms-list li.important::before{background:var(--red);}
  .a4-summary-box{display:flex;flex-direction:column;gap:8px;}
  .a4-summary-card{background:#F7F7F7;border-radius:12px;padding:10px 13px;}
  .a4-summary-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid #ECECEC;}
  .a4-summary-row:last-child{border-bottom:none;}
  .a4-sr-label{font-size:10.5px;color:#7A7A7A;font-weight:500;}
  .a4-sr-value{font-size:10.5px;color:#000;font-weight:600;}
  .a4-summary-row.total .a4-sr-label{font-size:11px;font-weight:700;color:#000;}

function todayStr(){ return new Date().toISOString().slice(0,10); }
/* تبدیل میلادی به شمسی (الگوریتم استاندارد بدون کتابخانه خارجی) */
function toJalali(gy, gm, gd){
  const g_d_m = [0,31,59,90,120,151,181,212,243,273,304,334];
  let jy = (gy <= 1600) ? 0 : 979;
  gy -= (gy <= 1600) ? 621 : 1600;
  const gy2 = (gm > 2) ? (gy + 1) : gy;
  let days = (365*gy) + (Math.floor((gy2+3)/4)) - (Math.floor((gy2+99)/100)) + (Math.floor((gy2+399)/400)) - 80 + gd + g_d_m[gm-1];
  jy += 33*Math.floor(days/12053);
  days %= 12053;
  jy += 4*Math.floor(days/1461);
  days %= 1461;
  if(days > 365){ jy += Math.floor((days-1)/365); days = (days-1)%365; }
  let jm, jd;
  if(days < 186){ jm = 1 + Math.floor(days/31); jd = 1 + (days%31); }
  else { jm = 7 + Math.floor((days-186)/30); jd = 1 + ((days-186)%30); }
  return [jy, jm, jd];
}
/* تبدیل شمسی به میلادی (معکوس toJalali — الگوریتم استاندارد jalaali) */
function toGregorian(jy, jm, jd){
  let gy = (jy <= 979) ? 621 : 1600;
  jy -= (jy <= 979) ? 0 : 979;
  let days = (365*jy) + (Math.floor(jy/33)*8) + Math.floor(((jy%33)+3)/4) + 78 + jd + ((jm < 7) ? (jm-1)*31 : ((jm-7)*30)+186);
  gy += 400*Math.floor(days/146097);
  days %= 146097;
  if(days > 36524){
    gy += 100*Math.floor(--days/36524);
    days %= 36524;
    if(days >= 365) days++;
  }
  gy += 4*Math.floor(days/1461);
  days %= 1461;
  if(days > 365){
    gy += Math.floor((days-1)/365);
    days = (days-1)%365;
  }
  let gd = days+1;
  const sal_a = [0,31,((gy%4===0 && gy%100!==0)||(gy%400===0))?29:28,31,30,31,30,31,31,30,31,30,31];
  let gm;
  for(gm=0; gm<13 && gd>sal_a[gm]; gm++) gd -= sal_a[gm];
  return [gy, gm, gd];
}
/* تبدیل رشته تاریخ شمسی به فرم ورودی کاربر (مثل ۱۴۰۳/۰۴/۰۵ یا 1403-04-05) به رشته میلادی ISO YYYY-MM-DD */
function jalaliInputToISO(str){
  if(!str) return '';
  const normalized = normalizeDigits(String(str).trim()).replace(/[\/\.]/g,'-');
  const parts = normalized.split('-').map(p=>parseInt(p,10));
  if(parts.length!==3 || parts.some(isNaN)) return '';
  let [jy,jm,jd] = parts;
  if(jy<100) jy += 1400; // ورودی کوتاه مثل 03-04-05 را به 1403 تعبیر می‌کنیم (بعید است، ولی محافظه‌کارانه)
  if(jm<1||jm>12||jd<1||jd>31) return '';
  const [gy,gm,gd] = toGregorian(jy,jm,jd);
  const p2 = n=>String(n).padStart(2,'0');
  return `${gy}-${p2(gm)}-${p2(gd)}`;
}
// کامپوننت ورودی تاریخ شمسی: یک input متنی که مقدار شمسی نشان می‌دهد، اما مقدار ذخیره‌شده همیشه میلادی ISO است
// placeholder نمونه‌ی فرمت را نشان می‌دهد؛ خطای ورودی نامعتبر را به‌صورت رنگ قرمز بوردر نشان می‌دهیم
function renderJalaliDateInput(id, isoValue, extraStyle){
  const display = isoValue ? jalaliStr(isoValue) : '';
  return `<input id="${id}" inputmode="numeric" placeholder="۱۴۰۳/۰۴/۰۵" value="${escapeAttr(display)}" data-iso="${escapeAttr(isoValue||'')}" style="${extraStyle||''}">`;
}
// روی یک input ساخته‌شده با renderJalaliDateInput رویداد می‌بندد؛ با هر تغییر، مقدار را به ISO تبدیل کرده و callback را صدا می‌زند
function bindJalaliDateInput(id, onChangeISO){
  const el = document.getElementById(id);
  if(!el) return;
  el.addEventListener('blur', e=>{
    const iso = jalaliInputToISO(e.target.value);
    if(!e.target.value.trim()){ el.style.borderColor=''; onChangeISO(''); return; }
    if(!iso){
      el.style.borderColor = 'var(--red)';
      return; // مقدار نامعتبر را ذخیره نمی‌کنیم، کاربر باید اصلاح کند
    }
    el.style.borderColor = '';
    e.target.value = jalaliStr(iso);
    onChangeISO(iso);
  });
}
function toPersianDigits(str){
  const fa = ['۰','۱','۲','۳','۴','۵','۶','۷','۸','۹'];
  return String(str).replace(/[0-9]/g, d=>fa[+d]);
}
function jalaliStr(dateStr){
  if(!dateStr) return '';
  const [gy,gm,gd] = dateStr.split('-').map(Number);
  if(!gy||!gm||!gd) return dateStr;
  const [jy,jm,jd] = toJalali(gy,gm,gd);
  const p2 = n=>String(n).padStart(2,'0');
  return toPersianDigits(`${jy}/${p2(jm)}/${p2(jd)}`);
}
function invNumStr(n){
  return toPersianDigits(String(n).padStart(3,'0'));
}
function projectCodeDisplay(code){
  const c = (code||'').trim();
  if(!c) return '-';
  return c.toUpperCase().startsWith('LS-') ? c : ('LS-' + c);
}
function addMonths(dateStr, months){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  d.setMonth(d.getMonth()+months);
  return d.toISOString().slice(0,10);
}
function fmt(n){ if(!isFinite(n)) return '۰'; return Math.round(n).toLocaleString('fa-IR'); }
// تبدیل ارقام فارسی (۰-۹) و عربی (٠-٩) به ارقام لاتین، تا ورودی‌های prompt/input هم با اعداد فارسی درست پارس شوند
function normalizeDigits(str){
  if(str==null) return str;
  const persian = '۰۱۲۳۴۵۶۷۸۹', arabic = '٠١٢٣٤٥٦٧٨٩';
  return String(str).replace(/[۰-۹٠-٩]/g, ch=>{
    let idx = persian.indexOf(ch);
    if(idx===-1) idx = arabic.indexOf(ch);
    return idx===-1 ? ch : String(idx);
  }).replace(/[٫،]/g,'.'); // جداکننده اعشاری فارسی/عربی هم به نقطه تبدیل شود
}
// نسخه سراسری parseFloat را با نسخه‌ای جایگزین می‌کنیم که قبل از پارس، ارقام فارسی/عربی را به لاتین تبدیل می‌کند.
// برای ورودی‌های لاتین رفتار کاملاً یکسان با parseFloat اصلی دارد — فقط ورودی فارسی/عربی هم پشتیبانی می‌شود.
const _nativeParseFloat = parseFloat;
parseFloat = function(str){
  if(typeof str === 'string') return _nativeParseFloat(normalizeDigits(str));
  return _nativeParseFloat(str);
};
function parseNum(str){ return parseFloat(normalizeDigits(str)); }
// خواندن مقدار عددی که نباید منفی باشد (مثل تعداد/qty) — مقادیر منفی یا نامعتبر به صفر تبدیل می‌شوند
// این از قیمت تمام‌شده یا جمع فاکتور منفی شدن به‌خاطر تعداد منفی جلوگیری می‌کند
function parseQty(val){ const n = parseFloat(val); return (isNaN(n) || n<0) ? 0 : n; }
function numberToPersianWords(num){
  num = Math.round(Math.abs(num||0));
  if(num===0) return 'صفر';
  const ones = ['','یک','دو','سه','چهار','پنج','شش','هفت','هشت','نه'];
  const tens = ['','ده','بیست','سی','چهل','پنجاه','شصت','هفتاد','هشتاد','نود'];
  const teens = ['ده','یازده','دوازده','سیزده','چهارده','پانزده','شانزده','هفده','هجده','نوزده'];
  const hundreds = ['','یکصد','دویست','سیصد','چهارصد','پانصد','ششصد','هفتصد','هشتصد','نهصد'];
  const scales = ['','هزار','میلیون','میلیارد','تریلیون'];
  function threeDigits(n){
    n = parseInt(n,10);
    if(n===0) return '';
    const h = Math.floor(n/100), t = Math.floor((n%100)/10), o = n%10;
    const parts = [];
    if(h) parts.push(hundreds[h]);
    if(t===1) parts.push(teens[o]);
    else {
      if(t) parts.push(tens[t]);
      if(o) parts.push(ones[o]);
    }
    return parts.join(' و ');
  }
  const groups = [];
  let n = num;
  while(n>0){ groups.unshift(n%1000); n = Math.floor(n/1000); }
  const parts = [];
  for(let i=0;i<groups.length;i++){
    const g = groups[i];
    if(g===0) continue;
    const scaleIdx = groups.length-1-i;
    const words = threeDigits(g);
    parts.push(scaleIdx>0 ? words+' '+scales[scaleIdx] : words);
  }
  return parts.join(' و ');
}
function amountToWordsToman(n){
  const words = numberToPersianWords(n);
  return words + ' تومان';
}
function escapeAttr(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function computeTotals(){
  const materialsCost = calc.items.reduce((s,it)=>{
    const mat = materials.find(m=>m.id===it.materialId);
    const qty = parseQty(it.qty);
    return s + (mat? mat.price*qty : 0);
  },0);
  const laborCost = calc.laborItems.reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  const autoOverhead = computeAutoOverhead();
  const overheadCost = calc.useAutoOverhead ? autoOverhead.perUnit : 0;
  const totalCost = materialsCost + laborCost + overheadCost;
  let consumerPrice = 0;
  if(calc.pricingMode==='margin'){
    const pct = parseFloat(calc.marginPct)||0;
    consumerPrice = totalCost*(1+pct/100);
  } else {
    consumerPrice = parseFloat(calc.manualPrice)||0;
  }
  const profit = consumerPrice - totalCost;
  const profitPct = totalCost>0 ? (profit/totalCost*100) : 0;
  return {materialsCost, laborCost, overheadCost, totalCost, consumerPrice, profit, profitPct, autoOverheadInfo: autoOverhead};
}

// قیمت فروش هر قالب را از آخرین رکورد تاریخچه با همان نام برمی‌گرداند (اگر نبود، صفر)
function productSalePrice(productName){
  const rec = records.find(r=>r.name===productName);
  return rec ? rec.consumerPrice : 0;
}
function invLineUnitPrice(line){
  if(line.productId){
    const p = products.find(x=>x.id===line.productId);
    return p ? productSalePrice(p.name) : 0;
  }
  return parseFloat(line.customPrice)||0;
}
function invLineName(line){
  if(line.productId){
    const p = products.find(x=>x.id===line.productId);
    return p ? p.name : '';
  }
  return line.customName||'';
}
function computeInvoiceTotals(inv){
  const linesTotal = inv.lines.reduce((s,l)=>{
    const qty = parseQty(l.qty);
    return s + invLineUnitPrice(l)*qty;
  },0);
  let discount = 0;
  if(parseFloat(inv.discountPct)>0) discount += linesTotal*(parseFloat(inv.discountPct)/100);
  if(parseFloat(inv.discountAmount)>0) discount += parseFloat(inv.discountAmount);
  const grandTotal = Math.max(0, linesTotal - discount);
  const paid = parseFloat(inv.paidAmount)||0;
  const balance = Math.max(0, grandTotal - paid);
  // اگر پرداختی بیشتر از جمع کل فاکتور باشد، آن مقدار اضافه به نفع مشتری (بستانکاری) است و نباید گم شود
  const overpaid = Math.max(0, paid - grandTotal);
  return {linesTotal, discount, grandTotal, paid, balance, overpaid};
}

// مانده/بدهی قبلی مشتری — مستقل از همین فاکتور، یعنی مانده‌ای که از قبل (فاکتورهای پیشین + واریزی‌ها) باقی مانده
// مثبت = مشتری بدهکار است (باید به ما بدهد) | منفی = مشتری بستانکار است (ما به او بدهکاریم)
function invoicePrevBalanceAuto(inv){
  if(!inv.customerId) return 0;
  const bal = customerBalance(inv.customerId); // net>0 یعنی بستانکار، net<0 یعنی بدهکار
  let net = bal.net;
  // اگر همین فاکتور قبلاً ذخیره شده و در حالت final/paid است، مانده‌ی خودش را از حساب کلی مشتری کم می‌کنیم
  // تا «بدهی قبلی» فقط شامل فاکتورهای دیگر باشد، نه خود این فاکتور
  if(inv.id){
    const saved = invoices.find(i=>i.id===inv.id);
    if(saved && saved.status!=='draft' && saved.status!=='cancelled'){
      const t = computeInvoiceTotals(saved);
      net = net + Math.max(0, t.balance); // مانده این فاکتور را به بستانکاری برگردان تا حذف شود
    }
  }
  return -net; // برگرداندن به فرم «بدهکاری مثبت»
}
function invoicePrevBalanceFinal(inv){
  if(inv.prevBalanceUseManual) return parseFloat(inv.prevBalanceManual)||0;
  return invoicePrevBalanceAuto(inv);
}

function newInvoiceFromDraft(){

  invTab = 'edit';

function loadInvoiceForEdit(id){
  const inv = invoices.find(i=>i.id===id);
  if(!inv) return;
  invDraft = JSON.parse(JSON.stringify(inv));
  if(invDraft.lines.length===0) invDraft.lines.push(blankInvoiceLine());
  editingInvId = id;
  invTab = 'edit';
}
function resolveInvoiceStatus(inv, targetStatus){
  let status = targetStatus || inv.status || 'draft';
  if(status==='final' || status==='paid'){
    const t = computeInvoiceTotals(inv);
    status = (t.grandTotal>0 && t.balance<=0) ? 'paid' : 'final';
  }
  return status;
}
function ensureCustomerLinked(invDraftObj){
  const name = (invDraftObj.customerName||'').trim();
  if(!name) return invDraftObj.customerId || '';
  // اگه قبلاً به یک مشتری موجود وصل شده، همان را نگه دار
  if(invDraftObj.customerId && customers.some(c=>c.id===invDraftObj.customerId)) return invDraftObj.customerId;
  // اگه اسم دقیقاً با یک مشتری موجود یکی بود، به همان وصل شود (بدون ساخت تکراری)
  const existing = customers.find(c=>c.name.trim()===name);
  if(existing) return existing.id;
  // وگرنه مشتری جدید ساخته شود
  const c = { id: Date.now().toString()+Math.random().toString(36).slice(2), name, phone: (invDraftObj.customerPhone||'').trim() };
  customers = [...customers, c];
  saveJSON(STORE_KEYS.customers, customers);
  return c.id;
}
function saveInvoiceDraft(targetStatus){
  if(!invDraft.customerName.trim() && invDraft.lines.every(l=>!invLineName(l))){
    alert('حداقل نام مشتری یا یک ردیف کالا را وارد کنید'); return;
  }
  if(targetStatus==='final' && !invDraft.validTo){
    invDraft.validFrom = invDraft.date;
    invDraft.validTo = addMonths(invDraft.date, 1);
  }
  if(targetStatus==='final'){
    invDraft.customerId = ensureCustomerLinked(invDraft);
  }
  // لایه دفاعی: فقط زمانی فاکتور موجود را ویرایش (merge) کن که id واقعاً با همان فاکتور تطبیق داشته باشد
  // این از overwrite ناخواسته جلوگیری می‌کند، حتی اگر editingInvId به اشتباه از یک مسیر دیگر باقی مانده باشد
  const existingIdx = editingInvId ? invoices.findIndex(i=>i.id===editingInvId) : -1;
  if(editingInvId && existingIdx>=0 && invDraft.id && invDraft.id===editingInvId){
    const idx = existingIdx;
    const merged = {...invDraft, status: targetStatus || invDraft.status};
    merged.status = resolveInvoiceStatus(merged, merged.status);
    invoices[idx] = merged;
  } else {
    const num = invoiceSeq;
    invoiceSeq = invoiceSeq + 1;
    saveJSON(STORE_KEYS.invoiceSeq, invoiceSeq);
    const inv = {...invDraft, id: Date.now().toString(), number: num, status: targetStatus || 'draft'};
    inv.status = resolveInvoiceStatus(inv, inv.status);
    invoices = [inv, ...invoices];
    editingInvId = inv.id;
  }
  saveJSON(STORE_KEYS.invoices, invoices);
  invTab = 'list';
  render();
}
function deleteInvoice(id){
  invoices = invoices.filter(i=>i.id!==id);
  saveJSON(STORE_KEYS.invoices, invoices);
  render();
}
function cycleInvoiceStatusInList(id){
  const idx = invoices.findIndex(i=>i.id===id);
  if(idx<0) return;
  const cur = invoices[idx].status;
  const order = {draft:'final', final:'paid', paid:'cancelled', cancelled:'draft'};
  invoices[idx].status = order[cur] || 'draft';
  saveJSON(STORE_KEYS.invoices, invoices);
  render();
}

function exportInvoiceJPG(inv){

  }
  root.innerHTML = buildA4InvoiceHTML(inv);
  const target = root.querySelector('.a4-wrap');
  html2canvas(target, {scale:3, useCORS:true, allowTaint:true, backgroundColor:'#ffffff', logging:false}).then(canvas=>{
    const link = document.createElement('a');
    const custNameForFile = (inv.customerName||'بدون نام').trim().replace(/[\\/:*?"<>|]/g,'-');
    link.download = 'LUMERASTEEL-' + custNameForFile + '-' + inv.number + '.jpg';

  });

function printInvoice(inv){

  const printWin = window.open('', '_blank');
  if(!printWin){
    alert('مرورگر اجازه باز شدن پنجره چاپ را نداد. لطفاً بازکردن پنجره‌های پاپ‌آپ را برای این سایت فعال کن');
    return;

  printWin.document.write(`<!DOCTYPE html>
<html lang="fa" dir="rtl"><head><meta charset="UTF-8">
<title>چاپ فاکتور ${invNumStr(inv.number)}</title>
${styleTag}
<style>
  body{margin:0;padding:0;background:#fff;}

let custView = 'list'; // 'list' | 'detail' | 'new'
let activeCustomerId = null;
let custNewDraft = { name:'', phone:'' };
let custCreditDraft = { amount:'', date: todayStr(), note:'' };

function blankCustomer(){ return { id: Date.now().toString(), name:'', phone:'' }; }

function customerBalance(customerId){
  // بدهکاری = جمع مانده فاکتورهای صادرشده/تسویه‌شده متصل به این مشتری
  // بستانکاری = جمع واریزی‌های آزاد ثبت‌شده + جمع اضافه‌پرداخت‌های فاکتورها (پولی که مشتری بیشتر از فاکتور داده)
  const linkedInvoices = invoices.filter(i=>i.customerId===customerId && i.status!=='draft' && i.status!=='cancelled');
  const debit = linkedInvoices.reduce((s,inv)=>{ const t=computeInvoiceTotals(inv); return s + t.balance; }, 0);
  const overpaidTotal = linkedInvoices.reduce((s,inv)=>{ const t=computeInvoiceTotals(inv); return s + t.overpaid; }, 0);
  const credit = transactions.filter(t=>t.customerId===customerId && t.type==='credit').reduce((s,t)=>s+(parseFloat(t.amount)||0),0) + overpaidTotal;
  return { debit, credit, net: credit - debit }; // net>0 یعنی بستانکار، net<0 یعنی بدهکار
}

function renderCustomersTab(){
  if(custView==='new'){
    return `
      <button id="custBackBtn" class="btn btn-outline" style="margin-bottom:10px">← بازگشت</button>

    `;
  }

    const c = customers.find(x=>x.id===activeCustomerId);
    if(!c){ custView='list'; return renderCustomersTab(); }
    const bal = customerBalance(c.id);

    const credits = transactions.filter(t=>t.customerId===c.id && t.type==='credit').sort((a,b)=> (b.date||'').localeCompare(a.date||''));
    return `
      <button id="custBackBtn" class="btn btn-outline" style="margin-bottom:10px">← بازگشت به لیست مشتریان</button>

          <span>بدهکاری: ${fmt(bal.debit)} ت</span>
          <span>بستانکاری: ${fmt(bal.credit)} ت</span>
        </div>
        <div style="margin-top:6px;font-weight:700;color:${bal.net<0?'var(--red)':'#1A7A3A'}">
          ${bal.net<0? 'مانده بدهکار مشتری: '+fmt(Math.abs(bal.net))+' ت' : (bal.net>0? 'مانده بستانکار مشتری: '+fmt(bal.net)+' ت' : 'تسویه کامل')}

      </div>

      <div class="box-gray" style="margin-top:14px">
        <div style="font-weight:700;margin-bottom:8px;font-size:13px">ثبت واریزی جدید (پیش‌پرداخت / بدون فاکتور)</div>
        <input id="custCreditAmount" type="text" inputmode="decimal" placeholder="مبلغ به تومان" value="${escapeAttr(custCreditDraft.amount)}" style="margin-bottom:8px">
        <div class="row-flex" style="margin-bottom:8px">
          ${renderJalaliDateInput('custCreditDate', custCreditDraft.date, 'flex:1')}
          <input id="custCreditNote" placeholder="توضیح (اختیاری)" value="${escapeAttr(custCreditDraft.note)}" style="flex:1">
        </div>
        <button id="custCreditSaveBtn" class="btn btn-black" style="width:100%">ثبت واریزی</button>
      </div>

      <div style="margin-top:16px;font-weight:700;font-size:13px">فاکتورهای این مشتری</div>
      ${linkedInvoices.length===0? '<p class="empty">فاکتوری ثبت نشده</p>' : linkedInvoices.map(inv=>{
        const t = computeInvoiceTotals(inv);
        return `<div class="card" style="margin-top:8px">
          <div class="card-title"><span>#${invNumStr(inv.number)} — ${STATUS_LABELS[inv.status]||inv.status}</span></div>
          <div class="card-sub">${jalaliStr(inv.date)} — <span style="color:${PROJECT_STATUS_COLORS[inv.projectStatus]||'#7A7A7A'}">${PROJECT_STATUS_LABELS[inv.projectStatus]||'استعلام'}</span></div>
          <div class="grid2">
            <span>جمع: ${fmt(t.grandTotal)} ت</span>
            <span style="color:${t.balance>0?'var(--red)':'#1A7A3A'}">${t.balance>0?'مانده: '+fmt(t.balance)+' ت':(t.overpaid>0?'اضافه‌پرداخت: '+fmt(t.overpaid)+' ت':'تسویه کامل')}</span>
          </div>
        </div>`;
      }).join('')}

      <div style="margin-top:16px;font-weight:700;font-size:13px">واریزی‌های آزاد</div>
      ${credits.length===0? '<p class="empty">واریزی ثبت نشده</p>' : credits.map(t=>`
        <div class="card" style="margin-top:8px">
          <div class="card-title"><span>${fmt(t.amount)} تومان</span>

          </div>
          <div class="card-sub">${jalaliStr(t.date)} ${t.note? '— '+escapeAttr(t.note):''}</div>
        </div>`).join('')}
    `;
  }
  // لیست مشتریان
  if(customers.length===0){
    return `<p class="empty">هنوز مشتری‌ای ثبت نشده</p>
    <button id="custNewBtn" class="btn btn-red" style="width:100%">+ مشتری جدید</button>`;
  }
  return `
    <button id="custNewBtn" class="btn btn-red" style="width:100%;margin-bottom:10px">+ مشتری جدید</button>
    ${customers.map(c=>{
      const bal = customerBalance(c.id);
      return `<div class="card cust-row" data-id="${c.id}" style="cursor:pointer">

        <div style="margin-top:6px;font-weight:700;color:${bal.net<0?'var(--red)':'#1A7A3A'}">
          ${bal.net<0? 'بدهکار: '+fmt(Math.abs(bal.net))+' ت' : (bal.net>0? 'بستانکار: '+fmt(bal.net)+' ت' : 'تسویه')}
        </div>
      </div>`;
    }).join('')}
  `;
}

    transactions = [...transactions, {

const BALANCE_STATUS_COLORS = { debtor:'var(--gray)', creditor:'var(--red)', settled:'#1A7A3A' };

function getCombinedBalances(){
  const rows = [];
  customers.forEach(c=>{
    const bal = customerBalance(c.id);
    let status, amount;
    if(bal.net<0){ status='debtor'; amount=Math.abs(bal.net); }
    else if(bal.net>0){ status='creditor'; amount=bal.net; }
    else { status='settled'; amount=0; }
    rows.push({ name:c.name, type:'مشتری', status, amount });
  });
  suppliers.forEach(s=>{
    const bal = supplierBalance(s.id);
    let status, amount;
    if(bal.debt>0){ status='creditor'; amount=bal.debt; }
    else { status='settled'; amount=0; }
    rows.push({ name:s.name, type:'تامین‌کننده', status, amount });
  });
  rows.sort((a,b)=>{
    if(a.status==='settled' && b.status!=='settled') return 1;
    if(a.status!=='settled' && b.status==='settled') return -1;
    return b.amount - a.amount;
  });
  return rows;
}

function expenseMonthSummary(){
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const todayS = todayStr();
  const inMonth = expenses.filter(e=> e.date>=monthStart && e.date<=todayS);
  // مقادیر منفی احتمالی (مثلا از بک‌آپ دستکاری‌شده) نادیده گرفته می‌شوند چون «هزینه منفی» بی‌معنی است
  const safeAmt = e => Math.max(0, parseFloat(e.amount)||0);
  const business = inMonth.filter(e=>e.tag==='business').reduce((s,e)=>s+safeAmt(e),0);
  const personal = inMonth.filter(e=>e.tag==='personal').reduce((s,e)=>s+safeAmt(e),0);
  const byCategory = {};
  inMonth.forEach(e=>{ byCategory[e.categoryName] = (byCategory[e.categoryName]||0) + safeAmt(e); });
  const topCategories = Object.entries(byCategory).sort((a,b)=>b[1]-a[1]);
  return { business, personal, total: business+personal, topCategories };
}

// پیشنهاد درصد سربار بر اساس میانگین چند ماه گذشته:
// برای هر ماه = (هزینه‌های کسب‌وکار همان ماه) ÷ (مجموع قیمت تمام‌شده رکوردهای تب محاسبه در همان ماه) × ۱۰۰
// فقط ماه‌هایی که هم هزینه و هم حداقل یک رکورد دارند حساب می‌شوند؛ ماه‌های ناقص نادیده گرفته می‌شوند تا میانگین را خراب نکنند
function suggestOverheadPercent(monthsBack){
  monthsBack = monthsBack || 3;
  const now = new Date();
  const monthRatios = [];
  for(let i=0;i<monthsBack;i++){
    const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
    const start = d.toISOString().slice(0,10);
    const endD = new Date(d.getFullYear(), d.getMonth()+1, 0);
    const end = endD.toISOString().slice(0,10);
    const exp = expenses.filter(e=> e.tag==='business' && e.date>=start && e.date<=end)
      .reduce((s,e)=>s+Math.max(0,parseFloat(e.amount)||0),0);
    const recCost = records.filter(r=> r.date>=start && r.date<=end)
      .reduce((s,r)=>s+Math.max(0,parseFloat(r.totalCost)||0),0);
    if(exp>0 && recCost>0) monthRatios.push(exp/recCost*100);
  }
  if(monthRatios.length===0) return null;
  const avg = monthRatios.reduce((s,v)=>s+v,0)/monthRatios.length;
  return { percent: Math.round(avg*10)/10, monthsUsed: monthRatios.length };
}
// سربار = درصد ثابت از قیمت تمام‌شده همین محصول (مواد+دستمزد) — مستقل از تعداد فروش این ماه
function computeAutoOverhead(){
  const materialsCost = calc.items.reduce((s,it)=>{
    const mat = materials.find(m=>m.id===it.materialId);
    const qty = parseQty(it.qty);
    return s + (mat? mat.price*qty : 0);
  },0);
  const laborCost = calc.laborItems.reduce((s,l)=>s+(parseFloat(l.cost)||0),0);
  const baseCost = Math.max(0, materialsCost + laborCost);
  // درصد سربار هرگز منفی نیست — منفی شدن سربار یعنی کاهش قیمت تمام‌شده که بی‌معنی است
  const pct = Math.max(0, parseFloat(overheadPercent)||0);
  const perUnit = baseCost * (pct/100);
  return { baseCost, percent: pct, perUnit };
}

let reportPeriod = 'month'; // week | month | q3 | q6 | year
let reportStartDate = todayStr();

function periodRange(period, startDateStr){
  const start = new Date(startDateStr || reportStartDate);
  const end = new Date(start);
  if(period==='week') end.setDate(end.getDate()+7);
  else if(period==='month') end.setMonth(end.getMonth()+1);
  else if(period==='q3') end.setMonth(end.getMonth()+3);
  else if(period==='q6') end.setMonth(end.getMonth()+6);
  else if(period==='year') end.setFullYear(end.getFullYear()+1);
  return { start: start.toISOString().slice(0,10), end: end.toISOString().slice(0,10) };
}

function reportData(period){
  const {start, end} = periodRange(period);
  const counted = invoices.filter(inv=> (inv.status==='final' || inv.status==='paid') && inv.date>=start && inv.date<=end);
  let lumera = 0, drafting = 0;
  counted.forEach(inv=>{
    const t = computeInvoiceTotals(inv);
    if(inv.activityType==='drafting') drafting += t.grandTotal;
    else lumera += t.grandTotal;
  });
  return { lumera, drafting, total: lumera+drafting, count: counted.length, start, end };
}

const REPORT_PERIOD_LABELS = { week:'هفتگی', month:'ماهانه', q3:'سه‌ماهه', q6:'شش‌ماهه', year:'سالانه' };

function customerReportData(){
  return customers.map(c=>{
    const counted = invoices.filter(i=> i.customerId===c.id && (i.status==='final' || i.status==='paid'));
    const totalPurchase = counted.reduce((s,inv)=> s + computeInvoiceTotals(inv).grandTotal, 0);
    const bal = customerBalance(c.id);
    return { id:c.id, name:c.name, totalPurchase, invoiceCount: counted.length, debtRemaining: bal.net<0? Math.abs(bal.net) : 0, creditRemaining: bal.net>0? bal.net : 0 };
  }).sort((a,b)=> b.totalPurchase - a.totalPurchase);
}

/* ---------- REMINDERS ---------- */
// نزدیک‌ترین تاریخ سررسید آینده برای یک «روز ثابت ماهانه» (مثلا همیشه روز ۵) را برمی‌گرداند
// اگر آن روز در همین ماه هنوز نگذشته باشد همین ماه، وگرنه ماه بعد
function nextDueDateForDay(day){
  const now = new Date();
  const y = now.getFullYear(), m = now.getMonth(), todayDate = now.getDate();
  let targetMonth = m, targetYear = y;
  if(day < todayDate){ targetMonth = m+1; }
  const lastDayOfTargetMonth = new Date(targetYear, targetMonth+1, 0).getDate();
  const safeDay = Math.min(day, lastDayOfTargetMonth); // برای ماه‌هایی که آن روز را ندارند (مثلا ۳۱ در بهمن)
  const d = new Date(targetYear, targetMonth, safeDay);
  return d.toISOString().slice(0,10);
}
function getAllReminders(){
  const list = [];
  invoices.forEach(inv=>{
    if(inv.status==='cancelled') return;
    const custName = inv.customerName || 'بدون نام';
    if(inv.deliveryDueDate && inv.projectStatus!=='delivered'){
      list.push({ id:'deliv-'+inv.id, date: inv.deliveryDueDate, type:'تحویل', text:`موعد تحویل فاکتور #${inv.number||'-'} — ${custName}`, invoiceId: inv.id, source:'auto', done:false });
    }
    if(inv.validTo && inv.status==='final'){
      list.push({ id:'valid-'+inv.id, date: inv.validTo, type:'اعتبار', text:`پایان اعتبار فاکتور #${inv.number||'-'} — ${custName}`, invoiceId: inv.id, source:'auto', done:false });
    }
  });
  expenseCategories.forEach(c=>{
    if(!c.dueDay) return;
    const dueDate = nextDueDateForDay(c.dueDay);
    list.push({ id:'expcat-'+c.id, date: dueDate, type:'هزینه ثابت', text:`سررسید ${c.name}${c.defaultAmount? ' — '+fmt(c.defaultAmount)+' ت':''}`, invoiceId:null, source:'auto', done:false });
  });
  manualReminders.forEach(r=>{
    if(r.done) return;
    list.push({ id:r.id, date:r.date, type:'یادآوری', text:r.text, invoiceId: r.invoiceId||null, source:'manual', done:false });
  });
  return list.sort((a,b)=> a.date.localeCompare(b.date));
}

function saveManualReminders(){ saveJSON(STORE_KEYS.reminders, manualReminders); }

function addManualReminder(date, text, invoiceId){
  if(!date || !text.trim()) return;
  manualReminders = [...manualReminders, { id: Date.now().toString()+Math.random().toString(36).slice(2), date, text: text.trim(), invoiceId: invoiceId||null, done:false }];
  saveManualReminders();
}
function deleteManualReminder(id){
  manualReminders = manualReminders.filter(r=>r.id!==id);
  saveManualReminders();
}

  customers.forEach(c=>{

    if(bal.net<0) custDebt += Math.abs(bal.net);
    else custCredit += bal.net;
  });
  const now = new Date();
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().slice(0,10);
  const todayS = todayStr();
  let lumera=0, drafting=0;
  invoices.filter(i=> (i.status==='final'||i.status==='paid') && i.date>=monthStart && i.date<=todayS).forEach(inv=>{

    if(inv.activityType==='drafting') drafting += t.grandTotal; else lumera += t.grandTotal;

}

function reportBarChart(lumera, drafting){
  const max = Math.max(lumera, drafting, 1);
  const w = 280, h = 140, barW = 70, gap = 60;
  const lumeraH = Math.round((lumera/max)*100);
  const draftingH = Math.round((drafting/max)*100);
  const x1 = 40, x2 = x1+barW+gap;
  return `
  <svg viewBox="0 0 ${w} ${h}" style="width:100%;max-width:320px;display:block;margin:10px auto">
    <line x1="10" y1="${h-20}" x2="${w-10}" y2="${h-20}" stroke="#ddd" stroke-width="1"/>
    <rect x="${x1}" y="${h-20-lumeraH}" width="${barW}" height="${lumeraH}" fill="#E61E32" rx="3"/>
    <text x="${x1+barW/2}" y="${h-20-lumeraH-6}" text-anchor="middle" font-size="10" fill="#000" font-weight="700">${fmt(lumera)}</text>
    <text x="${x1+barW/2}" y="${h-4}" text-anchor="middle" font-size="10" fill="#7A7A7A">LUMERA</text>
    <rect x="${x2}" y="${h-20-draftingH}" width="${barW}" height="${draftingH}" fill="#000000" rx="3"/>
    <text x="${x2+barW/2}" y="${h-20-draftingH-6}" text-anchor="middle" font-size="10" fill="#000" font-weight="700">${fmt(drafting)}</text>
    <text x="${x2+barW/2}" y="${h-4}" text-anchor="middle" font-size="10" fill="#7A7A7A">نقشه‌کشی</text>
  </svg>`;
}

      ${tab==='calc'?renderCalcTab(): tab==='invoice'?renderInvoiceTab(): tab==='customers'?renderCustomersTab(): tab==='suppliers'?renderSuppliersTab(): tab==='materials'?renderMaterialsTab(): tab==='products'?renderProductsTab(): tab==='report'?renderReportTab(): tab==='dashboard'?renderDashboardTab(): tab==='expenses'?renderExpensesTab(): renderHistoryTab()}
    </div>
    <div class="row-flex backup-row" style="margin-top:20px;border-top:1px solid #eee;padding-top:16px">
      <button id="downloadBackupBtn" class="btn btn-outline" style="flex:1">دانلود بک‌آپ</button>
      <button id="loadBackupBtn" class="btn btn-outline" style="flex:1">بارگذاری بک‌آپ</button>
      <input type="file" id="backupFileInput" accept=".json" style="display:none">
    </div>
    <p class="note">داده‌ها فقط روی همین مرورگر و همین فایل ذخیره می‌شوند — برای انتقال بین دستگاه‌ها از بک‌آپ استفاده کن</p>
  `;
  document.querySelectorAll('.tab-btn').forEach(el=>{
    el.addEventListener('click', e=>{ tab = e.currentTarget.dataset.tab; render(); });
  });
  if(tab==='calc') bindCalcEvents();
  if(tab==='invoice') (invTab==='edit' ? bindInvoiceEditEvents() : bindInvoiceListEvents());
  if(tab==='customers') bindCustomersEvents();
  if(tab==='suppliers') bindSuppliersEvents();
  if(tab==='materials') bindMaterialsEvents();
  if(tab==='products') bindProductsEvents();
  if(tab==='history') bindHistoryEvents();
  if(tab==='report') bindReportEvents();
  if(tab==='dashboard') bindDashboardEvents();
  if(tab==='expenses') bindExpensesEvents();
  bindBackupEvents();
}

function downloadBackup(){
  const data = { materials, products, records, invoices, invoiceSeq, customers, transactions, overheadPerUnit, overheadPercent, suppliers, purchases, manualReminders, expenses, expenseCategories, exportedAt: new Date().toISOString() };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const now = new Date();
  const stamp = todayStr() + '-' + String(now.getHours()).padStart(2,'0') + String(now.getMinutes()).padStart(2,'0') + String(now.getSeconds()).padStart(2,'0');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'lumera-backup-' + stamp + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  alert('بک‌آپ با نام lumera-backup-' + stamp + '.json دانلود شد');
}

function bindBackupEvents(){
  document.getElementById('downloadBackupBtn')?.addEventListener('click', downloadBackup);
  document.getElementById('loadBackupBtn')?.addEventListener('click', ()=>{
    document.getElementById('backupFileInput').click();
  });
  document.getElementById('backupFileInput')?.addEventListener('change', e=>{
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const data = JSON.parse(ev.target.result);
        const expectedKeys = ['materials','products','records','invoices','customers'];
        const isValidBackup = data && typeof data==='object' && expectedKeys.some(k=> Array.isArray(data[k]));
        if(!isValidBackup){
          alert('این فایل ساختار بک‌آپ لومرا را ندارد. لطفاً فایل JSON صحیح را انتخاب کن');
          e.target.value = '';
          return;
        }
        const itemCount = (data.invoices||[]).length + (data.customers||[]).length + (data.records||[]).length;
        const exportedAt = data.exportedAt ? jalaliStr(data.exportedAt.slice(0,10)) : 'نامشخص';
        if(!confirm('این بک‌آپ شامل ' + itemCount + ' رکورد است (تاریخ تهیه: ' + exportedAt + '). این کار اطلاعات فعلی همین دستگاه را با بک‌آپ جایگزین می‌کند. ادامه می‌دهید؟')) { e.target.value=''; return; }
        materials = data.materials || [];
        products = data.products || [];
        records = data.records || [];
        invoices = data.invoices || [];
        invoiceSeq = data.invoiceSeq || 2250;
        customers = data.customers || [];
        transactions = data.transactions || [];
        overheadPerUnit = data.overheadPerUnit || 0;
        overheadPercent = data.overheadPercent!=null ? data.overheadPercent : null;
        suppliers = data.suppliers || [];
        purchases = data.purchases || [];
        manualReminders = data.manualReminders || [];
        expenses = data.expenses || [];
        expenseCategories = data.expenseCategories || [];
        saveJSON(STORE_KEYS.materials, materials);
        saveJSON(STORE_KEYS.products, products);
        saveJSON(STORE_KEYS.records, records);
        saveJSON(STORE_KEYS.invoices, invoices);
        saveJSON(STORE_KEYS.invoiceSeq, invoiceSeq);
        saveJSON(STORE_KEYS.customers, customers);
        saveJSON(STORE_KEYS.transactions, transactions);
        saveJSON(STORE_KEYS.overheadPerUnit, overheadPerUnit);
        saveJSON(STORE_KEYS.overheadPercent, overheadPercent);
        saveJSON(STORE_KEYS.suppliers, suppliers);
        saveJSON(STORE_KEYS.purchases, purchases);
        saveJSON(STORE_KEYS.reminders, manualReminders);
        saveJSON(STORE_KEYS.expenses, expenses);
        saveJSON(STORE_KEYS.expenseCategories, expenseCategories);
        alert('بک‌آپ با موفقیت بارگذاری شد');
        render();
      }catch(err){
        alert('فایل بک‌آپ معتبر نیست');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });
}

render();

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  const swCode = `
    const CACHE_NAME='lumera-cache-v1';
    const ROOT='${new URL('./', location.href).href}';
    const SELF_URL='${location.href}';
    self.addEventListener('install', e=>{
      e.waitUntil(
        caches.open(CACHE_NAME).then(cache=>cache.addAll([ROOT, SELF_URL]))
      );
      self.skipWaiting();
    });
    self.addEventListener('activate', e=>{
      e.waitUntil(
        caches.keys().then(keys=>Promise.all(
          keys.filter(k=>k!==CACHE_NAME).map(k=>caches.delete(k))
        ))
      );
      self.clients.claim();
    });
    self.addEventListener('fetch', e=>{
      e.respondWith(
        caches.match(e.request).then(cached=>{
          if(cached) return cached;
          return fetch(e.request).then(res=>{
            return caches.open(CACHE_NAME).then(cache=>{
              cache.put(e.request, res.clone());
              return res;
            });
          }).catch(()=>cached || caches.match(SELF_URL));
        })
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl, {scope:'./'}).catch(err=>console.log('SW failed:', err));
}
</script>
